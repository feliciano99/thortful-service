# Optional: a local SonarQube server for code-quality + security-hotspot analysis.
#   podman compose -f docker-compose.sonar.yml up -d
#   open http://localhost:9000  (default login admin/admin, set a new password,
#   then My Account > Security > generate a token)
#
# Requires the host kernel setting vm.max_map_count >= 262144 (Elasticsearch).
# On WSL2/Podman:  wsl -d podman-machine-default sh -c "sysctl -w vm.max_map_count=262144"
#
# Then analyse the backend (token from above):
#   cd backend
#   ./mvnw verify sonar:sonar -Dsonar.host.url=http://localhost:9000 -Dsonar.token=<TOKEN>
services:
  sonarqube:
    image: docker.io/library/sonarqube:community
    container_name: thortful-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs

volumes:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
