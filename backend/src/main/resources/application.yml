app:
  seeding:
    enabled: true

spring:
  application:
    name: cards
  security:
    user:
      name: ${APP_AUTH_USER:admin}
      password: ${APP_AUTH_PASSWORD:admin}
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/thortful}
    username: ${SPRING_DATASOURCE_USERNAME:thortful}
    password: ${SPRING_DATASOURCE_PASSWORD:thortful}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

server:
  servlet:
    context-path: /${spring.application.name}/v1
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html