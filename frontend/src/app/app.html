<mat-toolbar color="primary" class="toolbar">
  <mat-icon>card_giftcard</mat-icon>
  <span class="title">Thortful Greeting Cards</span>
  <span class="spacer"></span>

  <button mat-icon-button [matMenuTriggerFor]="themeMenu" aria-label="Choose theme">
    <mat-icon>{{ themeIcon() }}</mat-icon>
  </button>
  <mat-menu #themeMenu="matMenu">
    <button mat-menu-item (click)="theme.set('light')">
      <mat-icon>light_mode</mat-icon>
      <span>Light</span>
    </button>
    <button mat-menu-item (click)="theme.set('dark')">
      <mat-icon>dark_mode</mat-icon>
      <span>Dark</span>
    </button>
    <button mat-menu-item (click)="theme.set('system')">
      <mat-icon>brightness_auto</mat-icon>
      <span>System</span>
    </button>
  </mat-menu>

  @if (isAuthenticated()) {
    <span class="user">{{ username() }}</span>
    <button mat-icon-button (click)="logout()" aria-label="Sign out">
      <mat-icon>logout</mat-icon>
    </button>
  }
</mat-toolbar>

<main>
  <router-outlet></router-outlet>
</main>
