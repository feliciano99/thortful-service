services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: thortful-postgres
    environment:
      POSTGRES_DB: thortful
      POSTGRES_USER: thortful
      POSTGRES_PASSWORD: thortful
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thortful -d thortful"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
